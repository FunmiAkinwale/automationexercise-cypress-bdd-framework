name: Cypress BDD E2E Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run the full suite every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      browser:
        description: "Browser to run tests on"
        required: false
        default: "chrome"
        type: choice
        options:
          - chrome
          - firefox
          - electron
      tags:
        description: "Cucumber tag filter (e.g. @smoke)"
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Install & Cache ─────────────────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Cache Cypress binary
        uses: actions/cache@v4
        id: cypress-cache
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Cypress binary
        if: steps.cypress-cache.outputs.cache-hit != 'true'
        run: npx cypress install

  # ── Smoke Tests ─────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore Cypress cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run smoke tests
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ github.event.inputs.browser || 'chrome' }}
          headed: false
          env: TAGS=@smoke
        env:
          CYPRESS_USER_EMAIL: ${{ secrets.CYPRESS_USER_EMAIL }}
          CYPRESS_USER_PASSWORD: ${{ secrets.CYPRESS_USER_PASSWORD }}

      - name: Upload smoke test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-test-screenshots
          path: cypress/screenshots
          retention-days: 7

  # ── Full Regression Suite ───────────────────────────────────────────────────
  regression:
    name: Full Regression (${{ matrix.feature }})
    runs-on: ubuntu-latest
    needs: smoke-tests
    strategy:
      fail-fast: false
      matrix:
        feature:
          - signup
          - login
          - addToCart
          - checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore Cypress cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run ${{ matrix.feature }} tests
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ github.event.inputs.browser || 'chrome' }}
          headed: false
          spec: cypress/e2e/features/${{ matrix.feature }}.feature
        env:
          CYPRESS_USER_EMAIL: ${{ secrets.CYPRESS_USER_EMAIL }}
          CYPRESS_USER_PASSWORD: ${{ secrets.CYPRESS_USER_PASSWORD }}

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ${{ matrix.feature }}-screenshots
          path: cypress/screenshots
          retention-days: 14

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.feature }}-videos
          path: cypress/videos
          retention-days: 7

      - name: Upload cucumber JSON results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-json-${{ matrix.feature }}
          path: cypress/reports/cucumber-json
          retention-days: 14

  # ── Generate & Publish Report ───────────────────────────────────────────────
  report:
    name: Generate HTML Report
    runs-on: ubuntu-latest
    needs: regression
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download all cucumber JSON artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cucumber-json-*
          path: cypress/reports/cucumber-json
          merge-multiple: true

      - name: Generate HTML report
        run: node cypress/support/generateReport.js

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: cypress-bdd-html-report
          path: cypress/reports/html-report
          retention-days: 30

      - name: Publish report summary to job
        run: |
          echo "## 🧪 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Feature | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Signup | ${{ needs.regression.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Login | ${{ needs.regression.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Add to Cart | ${{ needs.regression.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Checkout | ${{ needs.regression.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 Download the full HTML report from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
